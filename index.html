<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>복호두 키워드 검색량</title>
<style>
  :root{
    --bg: #241509;
    --bg-panel: #2f1d0f;
    --shell: #7a5330;
    --shell-light: #b98a52;
    --gold: #c99a3e;
    --gold-soft: #e0bd76;
    --ivory: #f3e9d8;
    --ivory-dim: #cbb99f;
    --line: rgba(243,233,216,0.12);
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --serif: 'Noto Serif KR', Georgia, serif;
    --sans: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(201,154,62,0.08), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(122,83,48,0.15), transparent 45%);
    color: var(--ivory);
    font-family: var(--sans);
    min-height: 100vh;
  }

  a { color: inherit; }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
  }

  .brand {
    font-family: var(--serif);
    font-size: 15px;
    letter-spacing: 0.14em;
    color: var(--gold-soft);
    text-transform: uppercase;
  }

  .status {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ivory-dim);
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--ivory-dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-left: 10px;
  }
  .refresh-btn:hover { border-color: var(--gold); color: var(--gold-soft); }

  /* --- Hero: walnut shell rings framing the keyword & sparkline --- */
  .hero {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 24px 0 40px;
  }

  .shell-rings {
    width: min(340px, 78vw);
    height: min(340px, 78vw);
  }

  .keyword-name {
    font-family: var(--serif);
    font-size: clamp(28px, 6vw, 40px);
    color: var(--ivory);
    letter-spacing: 0.02em;
  }

  .keyword-total {
    font-family: var(--mono);
    font-size: clamp(40px, 9vw, 64px);
    color: var(--gold-soft);
    line-height: 1;
    margin: 6px 0 2px;
  }

  .keyword-sub {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ivory-dim);
    letter-spacing: 0.04em;
  }

  .split-row {
    display: flex;
    gap: 28px;
    margin-top: 18px;
  }
  .split-item { text-align: center; }
  .split-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ivory-dim);
    text-transform: uppercase;
  }
  .split-value {
    font-family: var(--mono);
    font-size: 20px;
    color: var(--ivory);
    margin-top: 4px;
  }

  /* --- History table --- */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 22px 20px 8px;
  }

  .panel h2 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 16px;
    color: var(--gold-soft);
    margin: 0 0 16px;
    letter-spacing: 0.04em;
  }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: right;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--ivory-dim);
    font-weight: 400;
    padding: 8px 6px;
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
  }
  thead th:first-child { text-align: left; }
  tbody td {
    text-align: right;
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 6px;
    border-bottom: 1px solid var(--line);
    color: var(--ivory);
  }
  tbody td:first-child {
    text-align: left;
    font-family: var(--sans);
    color: var(--ivory-dim);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(201,154,62,0.06); }

  .empty, .error {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ivory-dim);
    text-align: center;
    padding: 40px 0;
  }
  .error { color: #d98a6b; }

  footer {
    margin-top: 32px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ivory-dim);
    opacity: 0.7;
  }

  @media (prefers-reduced-motion: no-preference) {
    .keyword-total { transition: opacity 0.4s ease; }
  }

  button:focus-visible, a:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand">Keyword Tracker</div>
      <div class="status">
        <span id="updatedAt">불러오는 중…</span>
        <button class="refresh-btn" id="refreshBtn" type="button">↻ 새로고침</button>
      </div>
    </header>

    <section class="hero">
      <svg class="shell-rings" id="shellRings" viewBox="0 0 340 340" aria-hidden="true"></svg>
      <div class="keyword-name">복호두</div>
      <div class="keyword-total" id="totalValue">–</div>
      <div class="keyword-sub">월간 검색량 (PC + 모바일)</div>
      <div class="split-row">
        <div class="split-item">
          <div class="split-label">PC</div>
          <div class="split-value" id="pcValue">–</div>
        </div>
        <div class="split-item">
          <div class="split-label">Mobile</div>
          <div class="split-value" id="mobileValue">–</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>최근 추이</h2>
      <div id="tableHost">
        <div class="empty">데이터를 불러오는 중…</div>
      </div>
    </section>

    <footer>네이버 검색광고 API · 매일 오전 9시 자동 수집</footer>
  </div>

<script>
(function () {
  const KEYWORD = "복호두";
  const els = {
    updatedAt: document.getElementById("updatedAt"),
    total: document.getElementById("totalValue"),
    pc: document.getElementById("pcValue"),
    mobile: document.getElementById("mobileValue"),
    tableHost: document.getElementById("tableHost"),
    rings: document.getElementById("shellRings"),
    refreshBtn: document.getElementById("refreshBtn"),
  };

  function fmt(n) {
    if (n === null || n === undefined) return "–";
    return n.toLocaleString("ko-KR");
  }

  function fmtDate(d) {
    const [, m, day] = d.split("-");
    return `${m}.${day}`;
  }

  // 동심원(호두 껍질 나이테) 안에 최근 검색량 추이를 그려주는 신 sparkline
  function drawShellRings(history) {
    const size = 340, cx = size / 2, cy = size / 2;
    const rings = [150, 120, 92, 66];
    let svg = "";

    rings.forEach((r, i) => {
      const opacity = 0.16 + i * 0.05;
      svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--shell)" stroke-width="1" opacity="${opacity}" />`;
    });

    if (history.length > 1) {
      const values = history.map((h) => h.total);
      const max = Math.max(...values, 1);
      const min = Math.min(...values, 0);
      const range = Math.max(max - min, 1);
      const R = 96;
      const points = history.map((h, i) => {
        const t = i / (history.length - 1);
        const angle = -Math.PI / 2 + t * Math.PI * 1.5;
        const norm = (h.total - min) / range;
        const radius = R * 0.55 + norm * R * 0.45;
        const x = cx + radius * Math.cos(angle);
        const y = cy + radius * Math.sin(angle);
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      });
      svg += `<polyline points="${points.join(" ")}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />`;
      const lastPt = points[points.length - 1].split(",");
      svg += `<circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="4.5" fill="var(--gold-soft)" />`;
    } else {
      svg += `<circle cx="${cx}" cy="${cy}" r="3" fill="var(--gold)" opacity="0.6" />`;
    }

    els.rings.innerHTML = svg;
  }

  function renderTable(history) {
    if (!history.length) {
      els.tableHost.innerHTML = '<div class="empty">아직 수집된 데이터가 없습니다. 첫 자동 수집(오전 9시) 또는 수동 실행을 기다려주세요.</div>';
      return;
    }
    const rows = [...history].reverse().slice(0, 30).map((h) => `
      <tr>
        <td>${fmtDate(h.date)}</td>
        <td>${fmt(h.pc)}</td>
        <td>${fmt(h.mobile)}</td>
        <td>${fmt(h.total)}</td>
      </tr>
    `).join("");

    els.tableHost.innerHTML = `
      <table>
        <thead>
          <tr><th>날짜</th><th>PC</th><th>모바일</th><th>합계</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  async function loadData() {
    els.updatedAt.textContent = "불러오는 중…";
    try {
      const res = await fetch(`data.json?_=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`data.json 요청 실패 (${res.status})`);
      const data = await res.json();

      const entry = data.keywords?.[KEYWORD];
      const history = entry?.history ?? [];
      const latest = history[history.length - 1];

      drawShellRings(history);
      renderTable(history);

      els.total.textContent = latest ? fmt(latest.total) : "–";
      els.pc.textContent = latest ? fmt(latest.pc) : "–";
      els.mobile.textContent = latest ? fmt(latest.mobile) : "–";

      els.updatedAt.textContent = data.updatedAt
        ? `업데이트: ${new Date(data.updatedAt).toLocaleString("ko-KR")}`
        : "아직 업데이트되지 않음";
    } catch (err) {
      console.error(err);
      els.updatedAt.textContent = "불러오기 실패";
      els.tableHost.innerHTML = `<div class="error">데이터를 불러올 수 없습니다: ${err.message}</div>`;
      drawShellRings([]);
    }
  }

  els.refreshBtn.addEventListener("click", loadData);
  loadData();
})();
</script>
</body>
</html>
