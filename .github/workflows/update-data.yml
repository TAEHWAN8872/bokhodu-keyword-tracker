name: Update Naver Keyword Data

on:
  schedule:
    # 매일 00:00 UTC = 한국 시간(KST) 오전 9시
    - cron: "17 33 * * *"  # 1차 시도 (KST 08:37경)
    - cron: "0 12 * * *"   # 2차 시도 (KST 21:00, 1차가 실패/스킵됐을 때 보완)
  workflow_dispatch: {} # 수동 실행 버튼도 사용 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 네이버 검색광고 API 조회
        env:
          NAVER_API_KEY: ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
        run: node scripts/fetch-naver.js

      - name: data.json 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: 키워드 검색량 자동 업데이트 ($(date +'%Y-%m-%d'))"
          git push
