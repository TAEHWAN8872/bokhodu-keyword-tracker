name: Update Naver Keyword Data
on:
  schedule:
    - cron: "30 23 * * *"   # 매일 KST 오전 8시 30분 (UTC 전날 23:30)
    - cron: "0 12 * * *"    # 매일 KST 오후 9시 (UTC 12:00)
  workflow_dispatch: {}     # 수동 실행 버튼도 사용 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 네이버 검색광고 API 조회
        env:
          NAVER_API_KEY: ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
        run: node scripts/fetch-naver.js

      - name: data.json 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: 키워드 검색량 자동 업데이트 ($(date +'%Y-%m-%d'))"
          git push
